<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Monument Gallery (dev)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #cfe3ef; overflow: hidden; font-family: sans-serif; }
    #c { display: block; width: 100vw; height: 100vh; }
    #label { position: fixed; left: 12px; top: 10px; font-weight: 700; color: #22303a; font-size: 18px; }
  </style>
  <script type="importmap">{ "imports": { "three": "../vendor/three.module.min.js" } }</script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="label"></div>
  <script type="module">
    import * as THREE from 'three';
    import { MONUMENTS } from '../data/monuments.js';
    import { BUILDERS } from '../js/models/index.js';

    const MAT = new THREE.MeshLambertMaterial({ vertexColors: true, flatShading: true });
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcfe3ef);
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 2000);
    scene.add(new THREE.HemisphereLight(0xffffff, 0xb0a080, 1.05));
    const sun = new THREE.DirectionalLight(0xfff2dc, 2.0); sun.position.set(3, 6, 4); scene.add(sun);
    const sun2 = new THREE.DirectionalLight(0xbcd0ff, 0.5); sun2.position.set(-4, 3, -3); scene.add(sun2);

    const params = new URLSearchParams(location.search);
    const single = params.get('id');

    function makeMonument(m) {
      const built = BUILDERS[m.model](m.color);
      const mesh = new THREE.Mesh(built.geometry, MAT);
      built.geometry.computeBoundingBox();
      return { mesh, bb: built.geometry.boundingBox, height: built.height };
    }

    if (single) {
      // one monument, centred, on a disc, camera at a 3/4 view
      const m = MONUMENTS.find((x) => x.id === single) || MONUMENTS[0];
      const { mesh, bb } = makeMonument(m);
      const size = new THREE.Vector3(); bb.getSize(size);
      const cx = (bb.min.x + bb.max.x) / 2, cz = (bb.min.z + bb.max.z) / 2;
      mesh.position.set(-cx, 0, -cz);
      scene.add(mesh);
      const disc = new THREE.Mesh(new THREE.CylinderGeometry(Math.max(size.x, size.z) * 0.72, Math.max(size.x, size.z) * 0.72, 0.2, 40), new THREE.MeshLambertMaterial({ color: 0xdcd2bf }));
      disc.position.y = -0.1; scene.add(disc);
      document.getElementById('label').textContent = `${m.name} — ${m.city}`;
      const R = Math.max(size.x, size.y, size.z);
      let ang = params.has('rot') ? parseFloat(params.get('rot')) : 0.7;
      function place() {
        camera.position.set(Math.sin(ang) * R * 1.7, size.y * 0.72 + R * 0.5, Math.cos(ang) * R * 1.7);
        camera.lookAt(0, size.y * 0.42, 0);
      }
      place();
      canvas.addEventListener('pointermove', (e) => { if (e.buttons) { ang -= e.movementX * 0.01; place(); } });
      addEventListener('wheel', (e) => { camera.position.multiplyScalar(1 + Math.sign(e.deltaY) * 0.06); });
    } else {
      // contact sheet: grid of all 22, each scaled to fit a cell
      const COLS = 6, CELL = 12;
      MONUMENTS.forEach((m, i) => {
        const { mesh, bb } = makeMonument(m);
        const size = new THREE.Vector3(); bb.getSize(size);
        const s = 6 / Math.max(size.x, size.y, size.z);
        const g = new THREE.Group();
        const cx = (bb.min.x + bb.max.x) / 2, cz = (bb.min.z + bb.max.z) / 2;
        mesh.position.set(-cx, 0, -cz);
        g.add(mesh); g.scale.setScalar(s);
        const col = i % COLS, row = Math.floor(i / COLS);
        g.position.set((col - (COLS - 1) / 2) * CELL, 0, (row - 1.5) * CELL);
        scene.add(g);
      });
      const rows = Math.ceil(MONUMENTS.length / COLS);
      camera.position.set(0, 46, 40);
      camera.lookAt(0, 0, (rows - 1.5) * CELL * 0 + 2);
      document.getElementById('label').textContent = '22 monuments — contact sheet';
    }

    function loop() { renderer.render(scene, camera); requestAnimationFrame(loop); }
    loop();
    window.__GAL__ = true;
    addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
  </script>
</body>
</html>
